<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="480" viewBox="0 0 1200 480" role="img" aria-labelledby="title desc">
  <title id="title">Local Voice Memory Assistant 对话流程</title>
  <desc id="desc">按住说话后，音频经本地 ASR、记忆检索、语言模型和语音合成形成可持久化的口语练习循环。</desc>
  <defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#f7f8fc"/><stop offset="1" stop-color="#e8edf8"/></linearGradient><linearGradient id="core"><stop stop-color="#263f75"/><stop offset="1" stop-color="#4667a8"/></linearGradient><filter id="s"><feDropShadow dy="10" stdDeviation="13" flood-color="#24375b" flood-opacity=".12"/></filter></defs>
  <rect width="1200" height="480" rx="28" fill="url(#bg)"/>
  <text x="60" y="72" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="34" font-weight="700" fill="#1b2945">把一次语音对话，变成可以延续的学习记忆</text>
  <text x="60" y="108" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="17" fill="#657086">本地优先的实验性英语口语助手；模型组件可以替换，也允许明确降级。</text>
  <g filter="url(#s)"><rect x="58" y="174" width="190" height="194" rx="22" fill="#fff"/><rect x="287" y="174" width="190" height="194" rx="22" fill="#fff"/><rect x="516" y="145" width="220" height="252" rx="27" fill="url(#core)"/><rect x="775" y="174" width="170" height="194" rx="22" fill="#fff"/><rect x="984" y="174" width="158" height="194" rx="22" fill="#fff"/></g>
  <g font-family="Segoe UI, Microsoft YaHei, sans-serif">
    <circle cx="99" cy="215" r="22" fill="#e8eefb"/><path d="M99 202v18m-9-8a9 9 0 0 0 18 0m-9 9v8" fill="none" stroke="#3b5e9f" stroke-width="3" stroke-linecap="round"/><text x="134" y="212" font-size="20" font-weight="700" fill="#223252">按住说话</text><text x="88" y="265" font-size="15" fill="#64728a">浏览器录音为 WAV</text><text x="88" y="299" font-size="15" fill="#64728a">WebSocket 流式状态</text><text x="88" y="333" font-size="15" fill="#64728a">Tauri 桌面壳</text>
    <text x="320" y="212" font-size="20" font-weight="700" fill="#223252">ASR</text><text x="320" y="265" font-size="15" fill="#64728a">faster-whisper</text><text x="320" y="299" font-size="15" fill="#64728a">不可用时明确降级</text><text x="320" y="333" font-size="15" fill="#64728a">输出转写文本</text>
    <circle cx="626" cy="198" r="31" fill="#ffffff22"/><path d="M611 187h30v24h-18l-8 7v-7h-4z" fill="none" stroke="white" stroke-width="3"/><text x="626" y="261" text-anchor="middle" font-size="22" font-weight="700" fill="white">记忆与 LLM</text><text x="626" y="298" text-anchor="middle" font-size="15" fill="#e3eaff">Markdown 长期记忆</text><text x="626" y="329" text-anchor="middle" font-size="15" fill="#e3eaff">Chroma / JSON 检索</text><text x="626" y="360" text-anchor="middle" font-size="15" fill="#e3eaff">llama.cpp 或兼容 API</text>
    <text x="810" y="212" font-size="20" font-weight="700" fill="#223252">回答</text><text x="810" y="265" font-size="15" fill="#64728a">流式文本事件</text><text x="810" y="299" font-size="15" fill="#64728a">纠错与练习建议</text><text x="810" y="333" font-size="15" fill="#64728a">更新学习画像</text>
    <text x="1021" y="212" font-size="20" font-weight="700" fill="#223252">朗读</text><text x="1017" y="265" font-size="15" fill="#64728a">本机 TTS</text><text x="1017" y="299" font-size="15" fill="#64728a">逐句播放</text><text x="1017" y="333" font-size="15" fill="#64728a">继续对话</text>
  </g>
  <path d="M257 271h20m-8-9 9 9-9 9M486 271h20m-8-9 9 9-9 9M746 271h19m-8-9 9 9-9 9M955 271h19m-8-9 9 9-9 9" fill="none" stroke="#8192b5" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="389" y="422" width="422" height="34" rx="17" fill="#ece3d7"/><text x="600" y="445" text-anchor="middle" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="15" fill="#795d39">实验项目：默认适配器含降级实现，音质与模型效果取决于本机环境</text>
</svg>
